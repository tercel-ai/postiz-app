<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>X 采集本地测试</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, sans-serif; color: #111; background: #fafafa; }
      .wrap { max-width: 820px; margin: 0 auto; padding: 24px 16px; }
      h1 { font-size: 20px; margin: 0 0 4px; }
      .hint { color: #666; font-size: 13px; margin: 0 0 20px; }
      .card { background: #fff; border: 1px solid #e3e3e3; border-radius: 10px; padding: 16px; margin-bottom: 20px; }
      .card h2 { font-size: 15px; margin: 0 0 12px; }
      .row { display: flex; gap: 8px; align-items: center; }
      .row input { padding: 8px 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
      .row input.grow { flex: 1; }
      .row input[type="number"] { width: 72px; }
      .row button { padding: 8px 16px; border: 0; border-radius: 8px; background: #1d9bf0; color: #fff; font-size: 14px; cursor: pointer; }
      .row button:disabled { background: #9bd2f5; cursor: default; }
      .status { margin-top: 10px; font-size: 12px; color: #666; }
      .status.err { color: #c00; }
      .list { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
      .item { border: 1px solid #eee; border-radius: 8px; padding: 10px 12px; background: #fff; }
      .item .meta { display: flex; justify-content: space-between; font-size: 13px; }
      .item .meta a { color: #1d9bf0; text-decoration: none; font-weight: 600; }
      .item .meta span { color: #999; }
      .item .text { margin: 6px 0; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
      .item .stats { color: #555; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>X 采集本地测试</h1>
      <p class="hint">
        开后台标签页 → 让 x.com 自己发 GraphQL 请求 → 拦截响应 → 解析显示。
        需已登录 x.com，全程不经过任何服务器。
      </p>

      <section class="card">
        <h2>① 关键字搜索（SearchTimeline）</h2>
        <div class="row">
          <input id="kw" class="grow" type="text" placeholder="关键字，例如 openai" />
          <input id="limit" type="number" value="20" min="1" max="50" title="返回条数" />
          <button id="searchBtn">搜索</button>
        </div>
        <div id="searchStatus" class="status"></div>
        <div id="searchList" class="list"></div>
      </section>

      <section class="card">
        <h2>② 按帖子 ID 取数（TweetDetail）</h2>
        <div class="row">
          <input id="tid" class="grow" type="text" placeholder="帖子数字 ID 或粘贴链接" />
          <button id="tweetBtn">获取</button>
        </div>
        <div id="tweetStatus" class="status"></div>
        <div id="tweetList" class="list"></div>
      </section>
    </div>
    <script src="options.js"></script>
  </body>
</html>
